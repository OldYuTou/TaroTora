name: Build Android APK

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remote-control/web/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      working-directory: remote-control/web
      run: |
        npm ci

    - name: Build Vue app
      working-directory: remote-control/web
      run: |
        npm run build

    - name: Install Capacitor CLI
      run: |
        npm install -g @capacitor/cli

    - name: Setup Capacitor Android project
      working-directory: remote-control/web
      run: |
        # 创建 Android 项目（如果不存在）
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        npx cap sync android

    - name: Build APK
      working-directory: remote-control/web/android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Sign APK
      if: github.event_name != 'pull_request'
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: remote-control/web/android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Upload unsigned APK
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-apk
        path: remote-control/web/android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload signed APK
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: signed-apk
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK to existing release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
