# FRP 客户端配置
# 将此文件保存为 frpc.toml，运行在被控端 Windows 电脑上

[common]
# 公网服务器地址
server_addr = your-server-ip-or-domain
server_port = 7000

# 认证配置（必须与 frps.toml 一致）
token = your-frp-token-here

# 日志配置
log_file = ./frpc.log
log_level = info
log_max_days = 3

# 被控端 Web 服务穿透
[remote-control-http]
type = http
local_port = 3000
custom_domains = your-domain.com

# 如果需要 HTTPS
# [remote-control-https]
# type = https
# local_port = 3000
# custom_domains = your-domain.com

# 备选：使用 TCP 模式（不需要域名）
[remote-control-tcp]
type = tcp
local_ip = 127.0.0.1
local_port = 3000
remote_port = 3000
